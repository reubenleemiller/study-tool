<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to StudyTool" />
  <title>Sign In — StudyTool</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- App stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-page preloader -->
  <div id="preloader" class="preloader">
    <div class="spinner-ring"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <h1 id="app-title"><i class="fa-solid fa-book-open"></i> StudyTool</h1>
        <p>Welcome back — sign in to continue</p>
      </div>

      <!-- Alert banner -->
      <div id="auth-alert" class="auth-error" role="alert"></div>

      <form id="login-form" novalidate autocomplete="on">

        <!-- Email with live-validation checkmark -->
        <div class="form-group">
          <label class="form-label" for="email">
            <i class="fa-regular fa-envelope"></i> Email Address
          </label>
          <div class="input-wrap">
            <input class="form-input" type="email" id="email"
                   placeholder="you@example.com" required autocomplete="email" />
            <i class="fa-solid fa-circle-check input-valid-icon" id="email-valid-icon"
               aria-hidden="true" title="Valid email address"></i>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="password"
                   placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
                   required autocomplete="current-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          <span class="btn-spinner"></span>
          <span class="btn-text">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </span>
        </button>
      </form>

      <div style="text-align:center;margin-top:1.25rem;display:flex;flex-direction:column;gap:0.6rem">
        <a href="reset-password.html" class="btn btn-ghost btn-sm" style="text-decoration:none">
          <i class="fa-solid fa-key"></i> Forgot your password?
        </a>
        <p style="color:var(--text-muted);font-size:0.875rem;margin:0">
          Don't have an account? <a href="signup.html">Register here</a>
        </p>
      </div>

    </div>
  </div>

  <div id="toast-container" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="config-loader.js"></script>
  <script>
    var sb = null;

    /* ── Helpers ── */
    function hidePreloader() {
      setTimeout(function() {
        var el = document.getElementById('preloader');
        if (el) el.classList.add('hidden');
      }, 300);
    }
    function btnLoading(btn, on) {
      if (!btn) return;
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }
    function showAlert(msg) {
      var el = document.getElementById('auth-alert');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      el.style.cssText = '';
    }
    function clearAlert() {
      var el = document.getElementById('auth-alert');
      if (el) { el.classList.remove('show'); el.textContent = ''; el.style.cssText = ''; }
    }
    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
    }

    function showConfigError(message) {
      showAlert(message || 'App configuration missing. Check Netlify environment variables.');
      var preloader = document.getElementById('preloader');
      if (preloader) preloader.classList.add('hidden');
      var buttons = document.querySelectorAll('button[type="submit"]');
      buttons.forEach(function(btn) { btn.disabled = true; });
    }

    async function initializeAppWithConfig() {
      try {
        if (typeof window.loadStudyToolConfig !== 'function') {
          throw new Error('Config loader missing. Ensure config-loader.js is included.');
        }
        var config = await window.loadStudyToolConfig();
        sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
        if (config.appName) {
          document.getElementById('app-title').innerHTML =
            '<i class="fa-solid fa-book-open"></i> ' + config.appName;
        }
      } catch (err) {
        showConfigError(err.message);
        return;
      }

      /* ── Redirect if already logged in ── */
      sb.auth.getSession().then(function(ref) {
        var session = ref.data.session;
        if (session) window.location.replace('index.html');
        else hidePreloader();
      });

      /* ── Live email validation checkmark ── */
      var emailInput = document.getElementById('email');
      var emailIcon  = document.getElementById('email-valid-icon');
      emailInput.addEventListener('input', function() {
        emailIcon.classList.toggle('show', isValidEmail(emailInput.value.trim()));
      });

      /* ── Sign-in form ── */
      document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn      = document.getElementById('login-btn');
        var email    = emailInput.value.trim();
        var password = document.getElementById('password').value;
        clearAlert();
        btnLoading(btn, true);
        var ref = await sb.auth.signInWithPassword({ email: email, password: password });
        btnLoading(btn, false);
        if (ref.error) showAlert('Invalid login credentials. Please check your email and password.');
      });

      /* ── Redirect on successful auth ── */
      sb.auth.onAuthStateChange(function(event, session) {
        if (event === 'SIGNED_IN' && session) window.location.replace('index.html');
      });
    }

    initializeAppWithConfig();
  </script>
</body>
</html>
