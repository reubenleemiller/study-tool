<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to StudyTool" />
  <title>Sign In — StudyTool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-page preloader -->
  <div id="preloader" class="preloader">
    <div class="spinner-ring"></div>
  </div>

  <!-- Login card -->
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <h1 id="app-title">📚 StudyTool</h1>
        <p>Welcome back — sign in to continue</p>
      </div>

      <!-- Error / success banner -->
      <div id="auth-alert" class="auth-error" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password"
                 placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          <span class="btn-spinner"></span>
          <span class="btn-text">Sign In</span>
        </button>
      </form>

      <div style="text-align:center;margin-top:1.25rem;display:flex;flex-direction:column;gap:0.6rem">
        <a href="reset-password.html" class="btn btn-ghost btn-sm" style="text-decoration:none">
          Forgot your password?
        </a>
        <p style="color:var(--text-muted);font-size:0.875rem;margin:0">
          Don't have an account? <a href="signup.html">Register here</a>
        </p>
      </div>

    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" role="status" aria-live="polite"></div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- App config (edit with your real Supabase keys) -->
  <script src="config.js"></script>

  <script>
    /* ── Shared helpers ── */
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    if (window.APP_NAME) document.getElementById('app-title').textContent = '📚 ' + window.APP_NAME;

    function hidePreloader() {
      setTimeout(() => document.getElementById('preloader')?.classList.add('hidden'), 300);
    }
    function btnLoading(btn, on) {
      if (!btn) return;
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }
    function showAlert(msg, type) {
      const el = document.getElementById('auth-alert');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      if (type === 'success') {
        el.style.cssText =
          'display:block;background:#ebfbee;border-color:#b2f2bb;color:#2f9e44';
      } else {
        el.style.cssText = ''; // revert to default danger style
      }
    }
    function clearAlert() {
      const el = document.getElementById('auth-alert');
      if (el) { el.classList.remove('show'); el.textContent = ''; el.style.cssText = ''; }
    }

    /* ── Redirect if already authenticated ── */
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.replace('index.html');
      } else {
        hidePreloader();
      }
    });

    /* ── Sign-in form ── */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn      = document.getElementById('login-btn');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      clearAlert();
      btnLoading(btn, true);

      const { error } = await sb.auth.signInWithPassword({ email, password });

      btnLoading(btn, false);

      if (error) {
        // Always show a friendly message for invalid credentials
        showAlert('Invalid login credentials. Please check your email and password.');
      } else {
        // onAuthStateChange fires → redirect happens automatically below
      }
    });

    /* ── Auth state listener ── */
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        window.location.replace('index.html');
      }
    });
  </script>
</body>
</html>
