<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a StudyTool account" />
  <title>Register — StudyTool</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- App stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-page preloader -->
  <div id="preloader" class="preloader">
    <div class="spinner-ring"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <h1 id="app-title"><i class="fa-solid fa-book-open"></i> StudyTool</h1>
        <p>Create your student account</p>
      </div>

      <!-- Alert banner -->
      <div id="auth-alert" class="auth-error" role="alert"></div>

      <button type="button" class="btn btn-outline btn-full btn-lg google-auth-btn mb-2" id="google-signup-btn">
        <span class="btn-spinner"></span>
        <span class="btn-text"><i class="fa-brands fa-google"></i> Sign up with Google</span>
      </button>

      <div class="auth-divider"><span>or</span></div>

      <form id="register-form" novalidate autocomplete="on">

        <!-- Full Name -->
        <div class="form-group">
          <label class="form-label" for="full-name">
            <i class="fa-regular fa-user"></i> Full Name
          </label>
          <div class="input-wrap">
            <input class="form-input" type="text" id="full-name"
                   placeholder="Your full name" required autocomplete="name" />
            <i class="fa-solid fa-circle-check input-valid-icon" id="name-valid-icon"
               aria-hidden="true" title="Name entered"></i>
          </div>
        </div>

        <!-- Email with live-validation checkmark -->
        <div class="form-group">
          <label class="form-label" for="email">
            <i class="fa-regular fa-envelope"></i> Email Address
          </label>
          <div class="input-wrap">
            <input class="form-input" type="email" id="email"
                   placeholder="you@example.com" required autocomplete="email" />
            <i class="fa-solid fa-circle-check input-valid-icon" id="email-valid-icon"
               aria-hidden="true" title="Valid email address"></i>
          </div>
        </div>

        <!-- Password with policy checklist -->
        <div class="form-group">
          <label class="form-label" for="password">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="password"
                   placeholder="Create a strong password" required minlength="8"
                   autocomplete="new-password" />
          </div>
          <!-- Password policy checklist -->
          <ul class="pwd-policy" id="pwd-policy" aria-label="Password requirements">
            <li id="p-len">
              <i class="fa-regular fa-circle pi"></i> At least 8 characters
            </li>
            <li id="p-upper">
              <i class="fa-regular fa-circle pi"></i> One uppercase letter (A&ndash;Z)
            </li>
            <li id="p-lower">
              <i class="fa-regular fa-circle pi"></i> One lowercase letter (a&ndash;z)
            </li>
            <li id="p-digit">
              <i class="fa-regular fa-circle pi"></i> One number (0&ndash;9)
            </li>
            <li id="p-special">
              <i class="fa-regular fa-circle pi"></i> One special character (!&nbsp;@&nbsp;#&nbsp;…)
            </li>
          </ul>
        </div>

        <!-- Confirm Password with match indicator -->
        <div class="form-group">
          <label class="form-label" for="confirm-password">
            <i class="fa-solid fa-lock"></i> Confirm Password
          </label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="confirm-password"
                   placeholder="Repeat your password" required
                   autocomplete="new-password" />
            <i class="fa-solid fa-circle-check input-valid-icon" id="confirm-valid-icon"
               aria-hidden="true" title="Passwords match"></i>
          </div>
          <div class="pwd-match-hint" id="match-hint">
            <i class="fa-solid fa-circle-xmark" id="match-icon"></i>
            <span id="match-text"></span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">
          <span class="btn-spinner"></span>
          <span class="btn-text">
            <i class="fa-solid fa-user-plus"></i> Create Account
          </span>
        </button>
      </form>

      <div style="text-align:center;margin-top:1.25rem">
        <p style="color:var(--text-muted);font-size:0.875rem;margin:0">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
        <p class="auth-legal">
          <a href="terms.html">Terms of Service</a>
          <span>&bull;</span>
          <a href="privacy.html">Privacy Policy</a>
        </p>
      </div>

    </div>
  </div>

  <div id="toast-container" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="config-loader.js"></script>
  <script>
    var sb = null;

    /* ── Helpers ── */
    function hidePreloader() {
      setTimeout(function() {
        var el = document.getElementById('preloader');
        if (el) el.classList.add('hidden');
      }, 300);
    }
    function btnLoading(btn, on) {
      if (!btn) return;
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }
    function showAlert(msg, type) {
      var el = document.getElementById('auth-alert');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      el.style.cssText = type === 'success'
        ? 'display:block;background:#ebfbee;border-color:#b2f2bb;color:#2f9e44'
        : '';
    }
    function clearAlert() {
      var el = document.getElementById('auth-alert');
      if (el) { el.classList.remove('show'); el.textContent = ''; el.style.cssText = ''; }
    }
    function formatSignupError(error) {
      if (!error) return 'Signup failed. Please try again.';
      if (error.status === 500) {
        return 'Signup failed due to a server error. Check Supabase Auth settings (Site URL, Redirect URLs, SMTP) and try again.';
      }
      return error.message || 'Signup failed. Please try again.';
    }
    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
    }
    function showConfigError(message) {
      showAlert(message || 'App configuration missing. Check Netlify environment variables.');
      var preloader = document.getElementById('preloader');
      if (preloader) preloader.classList.add('hidden');
      var buttons = document.querySelectorAll('button[type="submit"]');
      buttons.forEach(function(btn) { btn.disabled = true; });
    }

    async function initializeAppWithConfig() {
      try {
        if (typeof window.loadStudyToolConfig !== 'function') {
          throw new Error('Config loader missing. Ensure config-loader.js is included.');
        }
        var config = await window.loadStudyToolConfig();
        sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
        if (config.appName) {
          document.getElementById('app-title').innerHTML =
            '<i class="fa-solid fa-book-open"></i> ' + config.appName;
        }
      } catch (err) {
        showConfigError(err.message);
        return;
      }

      /* ── Redirect if already logged in ── */
      sb.auth.getSession().then(function(ref) {
        if (ref.data.session) window.location.replace('index.html');
        else hidePreloader();
      });

      /* ── Live email validation checkmark ── */
      document.getElementById('google-signup-btn').addEventListener('click', async function() {
        clearAlert();
        var btn = document.getElementById('google-signup-btn');
        btnLoading(btn, true);
        var ref = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: new URL('/index.html', location.origin).href,
            queryParams: { prompt: 'select_account' },
          },
        });
        btnLoading(btn, false);
        if (ref.error) showAlert(ref.error.message || 'Google sign-up failed.');
      });

      var emailInput = document.getElementById('email');
      var emailIcon  = document.getElementById('email-valid-icon');
      emailInput.addEventListener('input', function() {
        emailIcon.classList.toggle('show', isValidEmail(emailInput.value.trim()));
      });

      /* ── Live name validation checkmark ── */
      var nameInput = document.getElementById('full-name');
      var nameIcon  = document.getElementById('name-valid-icon');
      nameInput.addEventListener('input', function() {
        nameIcon.classList.toggle('show', nameInput.value.trim().length >= 2);
      });

      /* ── Password policy checker ── */
      var CRITERIA = [
        { id: 'p-len',     test: function(v) { return v.length >= 8; } },
        { id: 'p-upper',   test: function(v) { return /[A-Z]/.test(v); } },
        { id: 'p-lower',   test: function(v) { return /[a-z]/.test(v); } },
        { id: 'p-digit',   test: function(v) { return /[0-9]/.test(v); } },
        { id: 'p-special', test: function(v) { return /[^A-Za-z0-9]/.test(v); } },
      ];

      function setMetIcon(li, met) {
        var icon = li.querySelector('.pi');
        if (!icon) return;
        /* swap FA class */
        icon.className = met
          ? 'fa-solid fa-circle-check pi'
          : 'fa-regular fa-circle pi';
      }

      var pwdInput = document.getElementById('password');
      pwdInput.addEventListener('input', function() {
        var v = pwdInput.value;
        CRITERIA.forEach(function(c) {
          var li  = document.getElementById(c.id);
          var met = c.test(v);
          if (!li) return;
          li.classList.toggle('met', met);
          setMetIcon(li, met);
        });
        /* also re-check confirm match */
        checkConfirm();
      });

      /* ── Confirm-password match indicator ── */
      var confirmInput = document.getElementById('confirm-password');
      var confirmIcon  = document.getElementById('confirm-valid-icon');
      var matchHint    = document.getElementById('match-hint');
      var matchIcon    = document.getElementById('match-icon');
      var matchText    = document.getElementById('match-text');
      var confirmTouched = false;

      function checkConfirm() {
        if (!confirmTouched) return;
        var pw  = pwdInput.value;
        var cfw = confirmInput.value;
        if (!cfw) {
          matchHint.classList.remove('show', 'ok', 'bad');
          confirmIcon.classList.remove('show');
          return;
        }
        var ok = (pw === cfw);
        matchHint.className = 'pwd-match-hint show ' + (ok ? 'ok' : 'bad');
        matchIcon.className  = ok
          ? 'fa-solid fa-circle-check'
          : 'fa-solid fa-circle-xmark';
        matchText.textContent = ok ? 'Passwords match' : 'Passwords do not match';
        confirmIcon.classList.toggle('show', ok);
      }

      confirmInput.addEventListener('input', function() {
        confirmTouched = true;
        checkConfirm();
      });
      confirmInput.addEventListener('blur', function() {
        confirmTouched = true;
        checkConfirm();
      });

      /* ── Register form ── */
      document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        clearAlert();

        var btn     = document.getElementById('register-btn');
        var name    = nameInput.value.trim();
        var email   = emailInput.value.trim();
        var pass    = pwdInput.value;
        var confirm = confirmInput.value;

        /* Validation */
        if (!name)            { showAlert('Please enter your full name.');                  return; }
        if (!isValidEmail(email)) { showAlert('Please enter a valid email address.');       return; }
        if (pass !== confirm) { showAlert('Passwords do not match. Please try again.');     return; }

        var unmet = CRITERIA.filter(function(c) { return !c.test(pass); });
        if (unmet.length > 0) {
          showAlert('Your password does not meet all the requirements listed below.');
          return;
        }

        btnLoading(btn, true);
        var ref = await sb.auth.signUp({
          email: email,
          password: pass,
          options: {
            data: { full_name: name },
            emailRedirectTo: new URL('/index.html', location.origin).href,
          },
        });
        btnLoading(btn, false);

        if (ref.error) {
          showAlert(formatSignupError(ref.error));
        } else {
          showAlert(
            'Account created! Check your email and click the confirmation link, then sign in.',
            'success'
          );
          document.getElementById('register-form').reset();
          /* Reset policy UI */
          CRITERIA.forEach(function(c) {
            var li = document.getElementById(c.id);
            if (li) {
              li.classList.remove('met');
              setMetIcon(li, false);
            }
          });
          matchHint.classList.remove('show', 'ok', 'bad');
          confirmIcon.classList.remove('show');
          emailIcon.classList.remove('show');
          nameIcon.classList.remove('show');
          confirmTouched = false;
        }
      });
    }

    initializeAppWithConfig();
  </script>
</body>
</html>
