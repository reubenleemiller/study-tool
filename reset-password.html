<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reset your StudyTool password" />
  <title>Reset Password — StudyTool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-page preloader -->
  <div id="preloader" class="preloader">
    <div class="spinner-ring"></div>
  </div>

  <!-- Reset card -->
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <h1 id="app-title">📚 StudyTool</h1>
        <p>Reset your password</p>
      </div>

      <!-- Instruction text -->
      <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.25rem;text-align:center">
        Enter the email address linked to your account and we'll send you a secure reset link.
      </p>

      <!-- Error / success banner -->
      <div id="auth-alert" class="auth-error" role="alert"></div>

      <!-- Reset form (hidden once link is sent) -->
      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="reset-btn">
          <span class="btn-spinner"></span>
          <span class="btn-text">Send Reset Link</span>
        </button>
      </form>

      <!-- Success state (shown after send) -->
      <div id="success-state" style="display:none;text-align:center">
        <div style="font-size:3rem;margin-bottom:1rem">📧</div>
        <h2 style="font-size:1.15rem;font-weight:600;margin-bottom:0.5rem">Check your inbox</h2>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem">
          We sent a password reset link to <strong id="sent-to-email"></strong>.
          It may take a minute to arrive — also check your spam folder.
        </p>
        <button class="btn btn-outline btn-full" id="resend-btn" type="button">
          <span class="btn-spinner"></span>
          <span class="btn-text">Resend Link</span>
        </button>
      </div>

      <div style="text-align:center;margin-top:1.25rem">
        <a href="login.html" class="btn btn-ghost btn-sm" style="text-decoration:none">
          ← Back to Sign In
        </a>
      </div>

    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" role="status" aria-live="polite"></div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- App config -->
  <script src="config.js"></script>

  <script>
    /* ── Shared helpers ── */
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    if (window.APP_NAME) document.getElementById('app-title').textContent = '📚 ' + window.APP_NAME;

    function hidePreloader() {
      setTimeout(() => document.getElementById('preloader')?.classList.add('hidden'), 300);
    }
    function btnLoading(btn, on) {
      if (!btn) return;
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }
    function showAlert(msg, type) {
      const el = document.getElementById('auth-alert');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      el.style.cssText = type === 'success'
        ? 'display:block;background:#ebfbee;border-color:#b2f2bb;color:#2f9e44'
        : '';
    }
    function clearAlert() {
      const el = document.getElementById('auth-alert');
      if (el) { el.classList.remove('show'); el.textContent = ''; el.style.cssText = ''; }
    }

    /* ── Redirect if already authenticated ── */
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.replace('index.html');
      } else {
        hidePreloader();
      }
    });

    /* ── Send reset email ── */
    async function sendResetEmail(email) {
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        // On click the link, Supabase appends tokens to this URL.
        // set-password.html processes them and shows the new-password form.
        redirectTo: window.location.origin + '/set-password.html',
      });
      return error;
    }

    /* ── Form submit ── */
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const btn   = document.getElementById('reset-btn');
      const email = document.getElementById('email').value.trim();

      if (!email) { showAlert('Please enter your email address.'); return; }

      btnLoading(btn, true);
      const error = await sendResetEmail(email);
      btnLoading(btn, false);

      if (error) {
        showAlert(error.message);
      } else {
        // Show the success state
        document.getElementById('reset-form').style.display      = 'none';
        document.getElementById('success-state').style.display   = '';
        document.getElementById('sent-to-email').textContent     = email;

        // Wire up resend button
        document.getElementById('resend-btn').addEventListener('click', async () => {
          const resendBtn = document.getElementById('resend-btn');
          btnLoading(resendBtn, true);
          const err = await sendResetEmail(email);
          btnLoading(resendBtn, false);
          if (err) {
            showAlert(err.message);
          } else {
            showAlert('✅ Reset link resent — check your inbox.', 'success');
          }
        });
      }
    });
  </script>
</body>
</html>
