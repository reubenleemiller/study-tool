<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reset your StudyTool password" />
  <title>Reset Password — StudyTool</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- App stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-page preloader -->
  <div id="preloader" class="preloader">
    <div class="spinner-ring"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <h1 id="app-title"><i class="fa-solid fa-book-open"></i> StudyTool</h1>
        <p>Reset your password</p>
      </div>

      <!-- Instruction -->
      <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.25rem;text-align:center">
        Enter the email address linked to your account and we will send you a secure reset link.
      </p>

      <!-- Alert banner -->
      <div id="auth-alert" class="auth-error" role="alert"></div>

      <!-- Reset form -->
      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">
            <i class="fa-regular fa-envelope"></i> Email Address
          </label>
          <div class="input-wrap">
            <input class="form-input" type="email" id="email"
                   placeholder="you@example.com" required autocomplete="email" />
            <i class="fa-solid fa-circle-check input-valid-icon" id="email-valid-icon"
               aria-hidden="true" title="Valid email address"></i>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="reset-btn">
          <span class="btn-spinner"></span>
          <span class="btn-text">
            <i class="fa-solid fa-paper-plane"></i> Send Reset Link
          </span>
        </button>
      </form>

      <!-- Sent confirmation (shown after success) -->
      <div id="success-state" style="display:none;text-align:center">
        <i class="fa-regular fa-envelope-open"
           style="font-size:3rem;color:var(--primary);margin-bottom:1rem;display:block"></i>
        <h2 style="font-size:1.15rem;font-weight:600;margin-bottom:0.5rem">Check your inbox</h2>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem">
          We sent a reset link to <strong id="sent-to-email"></strong>.
          It may take a minute — also check your spam folder.
        </p>
        <button class="btn btn-outline btn-full" id="resend-btn" type="button">
          <span class="btn-spinner"></span>
          <span class="btn-text">
            <i class="fa-solid fa-rotate-right"></i> Resend Link
          </span>
        </button>
      </div>

      <div style="text-align:center;margin-top:1.25rem">
        <a href="login.html" class="btn btn-ghost btn-sm" style="text-decoration:none">
          <i class="fa-solid fa-arrow-left"></i> Back to Sign In
        </a>
      </div>

    </div>
  </div>

  <div id="toast-container" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="config-loader.js"></script>
  <script>
    var sb = null;

    /* ── Helpers ── */
    function hidePreloader() {
      setTimeout(function() {
        var el = document.getElementById('preloader');
        if (el) el.classList.add('hidden');
      }, 300);
    }
    function btnLoading(btn, on) {
      if (!btn) return;
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }
    function showAlert(msg, type) {
      var el = document.getElementById('auth-alert');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      el.style.cssText = type === 'success'
        ? 'display:block;background:#ebfbee;border-color:#b2f2bb;color:#2f9e44'
        : '';
    }
    function clearAlert() {
      var el = document.getElementById('auth-alert');
      if (el) { el.classList.remove('show'); el.textContent = ''; el.style.cssText = ''; }
    }
    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
    }

    function showConfigError(message) {
      showAlert(message || 'App configuration missing. Check Netlify environment variables.');
      var preloader = document.getElementById('preloader');
      if (preloader) preloader.classList.add('hidden');
      var buttons = document.querySelectorAll('button[type="submit"]');
      buttons.forEach(function(btn) { btn.disabled = true; });
    }

    async function initializeAppWithConfig() {
      try {
        if (typeof window.loadStudyToolConfig !== 'function') {
          throw new Error('Config loader missing. Ensure config-loader.js is included.');
        }
        var config = await window.loadStudyToolConfig();
        sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey, {
          global: {
            headers: {
              apikey: config.supabaseAnonKey,
              Authorization: 'Bearer ' + config.supabaseAnonKey,
            },
          },
        });
        if (config.appName) {
          document.getElementById('app-title').innerHTML =
            '<i class="fa-solid fa-book-open"></i> ' + config.appName;
        }
      } catch (err) {
        showConfigError(err.message);
        return;
      }

      /* ── Redirect if already logged in ── */
      sb.auth.getSession().then(function(ref) {
        if (ref.data.session) window.location.replace('index.html');
        else hidePreloader();
      });

      /* ── Live email validation checkmark ── */
      var emailInput = document.getElementById('email');
      var emailIcon  = document.getElementById('email-valid-icon');
      emailInput.addEventListener('input', function() {
        emailIcon.classList.toggle('show', isValidEmail(emailInput.value.trim()));
      });

      /* ── Send reset email helper ── */
      async function sendResetEmail(email) {
        var ref = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/set-password.html',
        });
        return ref.error;
      }

      /* ── Form submit ── */
      document.getElementById('reset-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        clearAlert();

        var btn   = document.getElementById('reset-btn');
        var email = emailInput.value.trim();

        if (!email || !isValidEmail(email)) {
          showAlert('Please enter a valid email address.');
          return;
        }

        btnLoading(btn, true);
        var error = await sendResetEmail(email);
        btnLoading(btn, false);

        if (error) {
          showAlert(error.message);
        } else {
          document.getElementById('reset-form').style.display    = 'none';
          document.getElementById('success-state').style.display = '';
          document.getElementById('sent-to-email').textContent   = email;

          /* Resend button */
          document.getElementById('resend-btn').addEventListener('click', async function() {
            var resendBtn = document.getElementById('resend-btn');
            btnLoading(resendBtn, true);
            var err = await sendResetEmail(email);
            btnLoading(resendBtn, false);
            if (err) showAlert(err.message);
            else showAlert('Reset link resent — check your inbox.', 'success');
          });
        }
      });
    }

    initializeAppWithConfig();
  </script>
</body>
</html>
