<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Set your StudyTool password" />
  <title>Set Password — StudyTool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-page preloader (shown while Supabase processes the email-link tokens) -->
  <div id="preloader" class="preloader">
    <div class="spinner-ring"></div>
  </div>

  <!-- Set-password card (hidden until tokens are verified) -->
  <div class="auth-page" id="auth-page" style="display:none">
    <div class="auth-card">

      <div class="auth-logo">
        <h1 id="app-title">📚 StudyTool</h1>
        <p id="page-subtitle">Set your password to get started</p>
      </div>

      <!-- Error / success banner -->
      <div id="auth-alert" class="auth-error" role="alert"></div>

      <form id="set-pwd-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <input class="form-input" type="password" id="new-password"
                 placeholder="Minimum 8 characters" required minlength="8"
                 autocomplete="new-password" />
          <div class="form-hint">Must be at least 8 characters.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input class="form-input" type="password" id="confirm-password"
                 placeholder="Repeat your password" required
                 autocomplete="new-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="set-pwd-btn">
          <span class="btn-spinner"></span>
          <span class="btn-text">Set Password &amp; Continue</span>
        </button>
      </form>

    </div>
  </div>

  <!-- Invalid / expired link state -->
  <div class="auth-page" id="error-page" style="display:none">
    <div class="auth-card" style="text-align:center">
      <div style="font-size:3rem;margin-bottom:1rem">⚠️</div>
      <h2 style="font-size:1.15rem;font-weight:600;margin-bottom:0.5rem">Link expired or invalid</h2>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem">
        This password-reset or invite link has expired or has already been used.
        Please request a new link.
      </p>
      <div style="display:flex;flex-direction:column;gap:0.75rem">
        <a href="reset-password.html" class="btn btn-primary btn-full" style="text-decoration:none">
          Request New Reset Link
        </a>
        <a href="login.html" class="btn btn-outline btn-full" style="text-decoration:none">
          Back to Sign In
        </a>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" role="status" aria-live="polite"></div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- App config -->
  <script src="config.js"></script>

  <script>
    /* ── Shared helpers ── */
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    if (window.APP_NAME) document.getElementById('app-title').textContent = '📚 ' + window.APP_NAME;

    let tokenType = null; // 'invite' | 'recovery' | null

    function hidePreloader() {
      setTimeout(() => document.getElementById('preloader')?.classList.add('hidden'), 300);
    }
    function showPage(id) {
      ['auth-page', 'error-page'].forEach(p => {
        document.getElementById(p).style.display = p === id ? '' : 'none';
      });
    }
    function btnLoading(btn, on) {
      if (!btn) return;
      btn.classList.toggle('loading', on);
      btn.disabled = on;
    }
    function showAlert(msg, type) {
      const el = document.getElementById('auth-alert');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      el.style.cssText = type === 'success'
        ? 'display:block;background:#ebfbee;border-color:#b2f2bb;color:#2f9e44'
        : '';
    }
    function clearAlert() {
      const el = document.getElementById('auth-alert');
      if (el) { el.classList.remove('show'); el.textContent = ''; el.style.cssText = ''; }
    }
    function toast(msg, type) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
      const el = document.createElement('div');
      el.className = 'toast ' + (type || 'info');
      el.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>';
      container.appendChild(el);
      setTimeout(() => {
        el.style.animation = 'slideInRight 0.3s ease reverse';
        setTimeout(() => el.remove(), 300);
      }, 3800);
    }

    /* ─────────────────────────────────────────────────────────────
     * Token detection
     *
     * Supabase email links (invite / recovery) arrive as:
     *   https://yourapp.com/set-password.html
     *     #access_token=…&refresh_token=…&type=invite
     *     #access_token=…&refresh_token=…&type=recovery
     *
     * The Supabase JS client automatically exchanges these tokens
     * when createClient() is called. We listen for the resulting
     * auth-state event to confirm success.
     * ───────────────────────────────────────────────────────────── */

    // Parse the URL hash ourselves to know what type of link this is
    (function detectLinkType() {
      const params = new URLSearchParams(window.location.hash.slice(1));
      tokenType = params.get('type'); // 'invite' | 'recovery' | null
    })();

    /* ── Auth state listener ── */
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // User followed a password-reset email link
        tokenType = tokenType || 'recovery';
        document.getElementById('page-subtitle').textContent = 'Enter your new password below';
        hidePreloader();
        showPage('auth-page');

      } else if (event === 'SIGNED_IN' && tokenType === 'invite') {
        // Invited user — they don't have a password yet
        document.getElementById('page-subtitle').textContent =
          'Welcome! Set a password to access your account';
        hidePreloader();
        showPage('auth-page');

      } else if (event === 'SIGNED_IN' && !tokenType) {
        // Already logged-in user somehow landed here — send to dashboard
        window.location.replace('index.html');

      } else if (event === 'INITIAL_SESSION' && !session) {
        // No tokens, no session — this page is useless without an email link
        // Only show error if there was no token in the URL to begin with
        if (!tokenType) {
          hidePreloader();
          showPage('error-page');
        }
      }
    });

    // Fallback: if no auth event fires within 4 s, show the error state
    const fallbackTimer = setTimeout(() => {
      if (document.getElementById('preloader')?.classList.contains('hidden')) return;
      hidePreloader();
      if (tokenType) {
        // Token present but no event yet — still show the form optimistically
        showPage('auth-page');
      } else {
        showPage('error-page');
      }
    }, 4000);

    /* ── Set-password form ── */
    document.getElementById('set-pwd-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();
      clearTimeout(fallbackTimer);

      const btn     = document.getElementById('set-pwd-btn');
      const pass    = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (pass !== confirm) {
        showAlert('Passwords do not match. Please try again.');
        return;
      }
      if (pass.length < 8) {
        showAlert('Password must be at least 8 characters long.');
        return;
      }

      btnLoading(btn, true);
      const { error } = await sb.auth.updateUser({ password: pass });
      btnLoading(btn, false);

      if (error) {
        showAlert(error.message);
      } else {
        toast('Password set successfully — welcome!', 'success');
        // Brief pause so the toast is visible, then redirect to the main app
        setTimeout(() => window.location.replace('index.html'), 1200);
      }
    });
  </script>
</body>
</html>
