<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive MCQ study tool with timed quizzes, stats and KaTeX math rendering." />
  <title>StudyTool – MCQ Practice</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
        integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV"
        crossorigin="anonymous" />

  <!-- App stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-page preloader shown during navigation -->
  <div id="preloader" class="preloader">
    <div class="spinner-ring"></div>
  </div>

  <!-- Single-page app root -->
  <div id="root"></div>

  <!-- Modal portal -->
  <div id="modal-container"></div>

  <!-- Toast notification stack -->
  <div id="toast-container" role="status" aria-live="polite"></div>

  <!-- KaTeX runtime -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
          integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
          integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05"
          crossorigin="anonymous"></script>

  <!-- Supabase JS (UMD – exposes window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- App settings (non-secret) -->
  <script src="config.js"></script>

  <!-- Runtime config loader (Netlify Functions) -->
  <script src="config-loader.js"></script>

  <!-- Main application -->
  <script src="main.js?v=20260512-admin-history1"></script>
</body>
</html>
